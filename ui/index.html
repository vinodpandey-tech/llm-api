<!DOCTYPE html>
<html>
<head>
  <title>LLM Streaming UI</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    textarea { width: 100%; height: 80px; }
    button { padding: 10px 20px; margin-top: 10px; }
    #output {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      min-height: 100px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Local LLM Streaming UI</h2>

  <textarea id="prompt" placeholder="Enter your prompt..."></textarea>
  <br>
  <button onclick="startStream()">Generate</button>
  <button onclick="stopStream()">Stop</button>

  <div id="output"></div>

<script>
  let eventSource = null;
  let currentRequestId = null;

  function startStream() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");

    if (currentRequestId) {
      fetch(`/cancel?request_id=${currentRequestId}`, {
        method: "POST"
      }).catch(() => {});
    }

    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }

    output.innerHTML = "";
    // Generate unique request ID
    currentRequestId = crypto.randomUUID();

    // set URL for the api to test
    const url = `/generate-stream-queued?prompt=${encodeURIComponent(prompt)}&request_id=${currentRequestId}`;

    eventSource = new EventSource(url);

    eventSource.onmessage = function(event) {
      if (event.data === "[DONE]") {
        eventSource.close();
        eventSource = null;
        currentRequestId = null;
        return;
      }

      output.innerHTML += event.data;
    };

    eventSource.onerror = function() {
      output.innerHTML += "\n[Error occurred]";
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      currentRequestId = null;
    };
  }

  async function stopStream() {
    const output = document.getElementById("output");

    if (currentRequestId) {
      await fetch(`/cancel?request_id=${currentRequestId}`, {
        method: "POST"
      }).catch(() => {});
    }

    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }

    currentRequestId = null;

    output.innerHTML += "\n\n[Stopped by user]";
  }
</script>

</body>
</html>
